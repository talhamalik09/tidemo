
   <div class="page">
    <img src="assets/Captureee.png" class="page-logo" />

  <div class="card">

    <!-- Logo + Title -->
    
      
      <div class="header">
      <div class="title-text">
        <h2>FUSION</h2>
        <p>TRADE INNOVATION</p>
      </div>
    </div>

    <!-- Inputs -->
    <div class="form">
      <div class="input-wrapper">
      <input
        type="text"
        placeholder="Username"
        [(ngModel)]="username"
        class="input"
      />

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        style="width: 430px; padding: 11px 14px; max-width: 420px"
      />
    </div>

      <button class="btn" (click)="login()">Sign in</button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Support: +44 207 320 5000 | www.finastra.com</p>
      <span>© 2024 Finastra</span>
    </div>

  </div>

 </div>
