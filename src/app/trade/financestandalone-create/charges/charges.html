<form [formGroup]="form">

<div class="section">

  <!-- HEADER -->
  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels.en.charges }}</h3>
  </div>

  <!-- BODY -->
  <div class="section-body" *ngIf="isOpen">

    <!-- PREFERRED CURRENCY -->
    <div class="form-group">
      <label>{{ labels.en.preferredCurrencyinfinancestandalonecharges }}</label>
      <input type="text" formControlName="preferredCurrency">
    </div>

    <!-- CHARGES FOR -->
    <div class="form-group">
      <label>{{ labels.en.chargesForinfinancestandalonecharges }}</label>
      <select formControlName="chargesFor">
        <option value="">Select</option>
        <option *ngFor="let c of chargeForOptions">{{ c }}</option>
      </select>
    </div>

    <!-- BILLING LEVEL -->
    <div class="form-group">
      <label>{{ labels.en.billingLevel }}</label>
      <select formControlName="billingLevel">
        <option value="">Select</option>
        <option *ngFor="let b of billingOptions">{{ b }}</option>
      </select>
    </div>

  </div>

</div>

</form>
