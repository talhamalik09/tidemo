<form [formGroup]="form">

<div class="section">

  <!-- HEADER -->
  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].collateralSection }}</h3>
  </div>

  <!-- BODY -->
  <div class="section-body" [class.closed]="!isOpen">

    <!-- CODE -->
    <div class="form-group">
      <label>{{ labels[lang].codeinshipmentguaranteecollateral }}</label>
      <input type="text" formControlName="code">
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group">
      <label>{{ labels[lang].descriptioninshipmentguaranteecollateral }}</label>
      <input type="text" formControlName="description">
    </div>

    <!-- AMOUNT -->
    <div class="form-group">
      <label>{{ labels[lang].amountinshipmentguaranteecollateral }}</label>
      <input type="text" formControlName="amount">
    </div>

    <!-- CCY -->
    <div class="form-group">
      <label>{{ labels[lang].ccyinshipmentguaranteecollateral }}</label>
      <input type="text" formControlName="ccy">
    </div>

    <!-- BUTTONS -->
    <div class="button-row">
      <button type="button" (click)="add()">
        {{ labels[lang].addinshipmentguaranteecollateral }}
      </button>

      <button type="button" (click)="update()">
        {{ labels[lang].updateinshipmentguaranteecollateral }}
      </button>

      <button type="button" (click)="delete()">
        {{ labels[lang].deleteinshipmentguaranteecollateral }}
      </button>
    </div>

  </div>

</div>

</form>
