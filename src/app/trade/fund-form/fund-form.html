
<div class="page-container">
<main class="main-content">

<div class="form-container">
  <h2>Fund Form</h2>

  <form [formGroup]="fundForm" (ngSubmit)="submitForm()">

    <div class="form-row">
      <div class="form-group">
        <label>{{ labelService.fullName  }}</label>
        <input type="text" formControlName="fullName">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" formControlName="phone">
      </div>

      <div class="form-group">
        <label>CNIC</label>
        <input type="text" formControlName="cnic">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Address</label>
        <input type="text" formControlName="address">
      </div>

      <div class="form-group">
        <label>Amount</label>
        <input type="number" formControlName="fundAmount">
      </div>
    </div>

    <div class="form-row">
      

      <div class="form-group">
        <label>{{ labelService.startDate  }}</label>
        <input type="date" formControlName="startDate" 
        [max]="fundForm.get('startDate')?.value">
      </div>

      <div class="form-group">
  <label>End Date</label>
  <input 
    type="date" 
    formControlName="endDate"
    [min]="fundForm.get('endDate')?.value"
  >
</div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Payment Method</label>
        <select formControlName="paymentMethod">
          <option value="">Select</option>
          <option value="Cash">Cash</option>
          <option value="Bank Transfer">Bank Transfer</option>
        </select>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <input type="text" formControlName="notes">
      </div>
    </div>
      <input type="password" formControlName="password" placeholder="Enter Password" />
    

    
  </form>

<button type="button" (click)="addField()">Add Field</button>

<div *ngFor="let field of extraFields; let i = index">

  <!-- Select field type -->
  <select [(ngModel)]="field.type">
    <option value="text">Text</option>
    <option value="dropdown">Dropdown</option>
  </select>

  <!-- TEXT FIELD -->
  <input *ngIf="field.type === 'text'"
         [(ngModel)]="field.value"
         placeholder="Enter text" />

  <!-- DROPDOWN FIELD -->
  <select *ngIf="field.type === 'dropdown'" [(ngModel)]="field.value">
    <option *ngFor="let opt of field.options" [value]="opt">
      {{ opt }}
    </option>
  </select>

</div>


<form [formGroup]="fundForm" (ngSubmit)="submitForm()">


    <button type="submit">Submit</button>
  </form>
</div>

</main>
</div>
