<form [formGroup]="form">

<div class="section">

  <!-- HEADER -->
  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].goodsinexportgoods }}</h3>
  </div>

  <!-- BODY -->
  <div class="section-body" [class.closed]="!isOpen">

    <!-- ADD BUTTON -->
     <div class="button-row">
    <button type="button" (click)="addGoods()">
      Add Goods
    </button>
</div>
    <!-- FORM ARRAY -->
    <div formArrayName="goodsList">

      <div
        *ngFor="let group of goodsList.controls; let i = index"
        [formGroupName]="i"
      >

        <!-- GOODS CODE -->
        <div class="form-group">
          <label>{{ labels[lang].goodsCodeinexportgoods }}</label>
          <input type="text" formControlName="goodsCode">
        
</div>
        <!-- GOODS DESCRIPTION -->
        <div class="form-group">
          <label>{{ labels[lang].goodsDescriptioninexportgoods }}</label>
          <input type="text" formControlName="goodsDescription">
        </div>

        <!-- REMOVE -->
         <div class="button-row">
        <button type="button" (click)="removeGoods(i)">
          Remove
        </button>

        </div>
      </div>

    </div>

  </div>

</div>

</form>
