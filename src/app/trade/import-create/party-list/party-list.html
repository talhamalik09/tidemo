<form [formGroup]="form">

<div class="section">

  <!-- HEADER -->
  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].partyList }}</h3>
  </div>

  <!-- BODY -->
  <div class="section-body" [class.closed]="!isOpen">

    <!-- ✅ CHECKBOX GROUP (FIXED) -->
    <div class="checkbox-group">

      <div class="form-group">
        <div class="checkbox-label">
      <label>
        <input type="checkbox" formControlName="sharedLiability">
        {{ labels[lang].sharedLiability }}
      </label>

      </div>
      </div>
      </div>

      
        <div class="checkbox-group">

      <div class="form-group">
        <div class="checkbox-label">
        <input type="checkbox" formControlName="showExtraParties">
        {{ labels[lang].showExtraParties }}
        </div>
      </div>
        </div>

 

      <div class="checkbox-group">

      <div class="form-group">
        <div class="checkbox-label">
        <input type="checkbox" formControlName="showLiabilitySharedParties">
        {{ labels[lang].showLiabilitySharedParties }}
      </div>
      </div>
      </div>

      <div class="checkbox-group">

      <div class="form-group">
        <div class="checkbox-label">
        <input type="checkbox" formControlName="linkToParticipation">
        {{ labels[lang].linkToParticipation }}
        </div>
        </div>
        </div>

    

    <!-- INPUTS -->
    <div class="form-group">
      <label>{{ labels[lang].role }}</label>
      <input type="text" formControlName="role">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].party }}</label>
      <input type="text" formControlName="party">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].referenceinpartylist  }}</label>
      <input type="text" formControlName="reference">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].liability }}</label>
      <input type="number" formControlName="liability">
    </div>

    <!-- BUTTONS -->
    <div class="button-row">
      <button type="button" (click)="save('add')">{{ labels[lang].add }}</button>
      <button type="button" (click)="save('update')">{{ labels[lang].updateinpartylist }}</button>
      <button type="button" (click)="save('delete')">{{ labels[lang].deleteinpartylist  }}</button>
      <button type="button" (click)="save('view')">{{ labels[lang].view }}</button>
      <button type="button" (click)="save('roles')">{{ labels[lang].roles }}</button>
    </div>

  </div>

</div>

</form>
