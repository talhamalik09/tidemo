<form [formGroup]="form">

<div class="section">

  <!-- HEADER -->
  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].foreignExchangeContract }}</h3>
  </div>

  <!-- BODY -->
  <div class="section-body" [class.closed]="!isOpen">

    <!-- REFERENCE -->
    <div class="form-group">
      <label>{{ labels[lang].referenceinforeignexchange }}</label>
      <input type="text" formControlName="reference">
    </div>

    <!-- BRANCH -->
    <div class="form-group">
      <label>{{ labels[lang].branch }}</label>
      <input type="text" formControlName="branch">
    </div>

    <!-- TYPE -->
    <div class="form-group">
      <label>{{ labels[lang].type }}</label>
      <input type="text" formControlName="type">
    </div>

    <!-- PURCHASE CURRENCY -->
    <div class="form-group">
      <label>{{ labels[lang].purchaseCurrency }}</label>
      <input type="text" formControlName="purchaseCurrency">
    </div>

    <!-- SALE CURRENCY -->
    <div class="form-group">
      <label>{{ labels[lang].saleCurrency }}</label>
      <input type="text" formControlName="saleCurrency">
    </div>

    <!-- RATE -->
    <div class="form-group">
      <label>{{ labels[lang].rate }}</label>
      <input type="number" formControlName="rate">
    </div>

    <!-- BUTTONS -->
    <div class="button-row">

      <button type="button" (click)="add()" [disabled]="form.invalid">
        {{ labels[lang].add }}
      </button>

      <button type="button" (click)="update()" [disabled]="form.invalid">
        {{ labels[lang].update }}
      </button>

      <button type="button" (click)="delete()" [disabled]="form.invalid">
        {{ labels[lang].delete }}
      </button>

      <button type="button" (click)="view()" [disabled]="form.invalid">
        {{ labels[lang].view }}
      </button>

    </div>

  </div>

</div>

</form>
