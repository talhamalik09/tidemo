<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>{{ labels.en.partyDetailsinexportcreditagencyfacilityparty }}</h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <!-- BASIC FIELDS -->
      <div class="form-group">
        <label>{{ labels.en.reference }}</label>
        <input type="text" formControlName="reference">
      </div>

      <div class="form-group">
        <label>{{ labels.en.fundingPartyOldReference }}</label>
        <input type="text" formControlName="fundingPartyOldReference">
      </div>

      <div class="form-group">
        <label>{{ labels.en.roleinexportcreditagencyfacilityparty }}</label>
        <input type="text" formControlName="role">
      </div>

      <div class="form-group">
        <label>{{ labels.en.partyinexportcreditagencyfacilityparty }}</label>
        <input type="text" formControlName="party">
      </div>

      <div class="form-group">
        <label>{{ labels.en.partyReference }}</label>
        <input type="text" formControlName="partyReference">
      </div>

      <div class="form-group">
        <label>{{ labels.en.liabilityinexportcreditagencyfacilityparty }}</label>
        <input type="text" formControlName="liability">
      </div>

      <!-- CHECKBOX GROUP -->
      <div class="checkbox-group">

        <label>
          <input type="checkbox" formControlName="showExtraParties">
          {{ labels.en.showExtraPartiesinexportcreditagencyfacilityparty }}
        </label>

        <label>
          <input type="checkbox" formControlName="showLiabilitySharedParties">
          {{ labels.en.showLiabilitySharedPartiesinexportcreditagencyfacilityparty }}
        </label>

        <label>
          <input type="checkbox" formControlName="showAllParties">
          {{ labels.en.showAllPartiesinexportcreditagencyfacilityparty }}
        </label>

      </div>

      <!-- EXPORT CREDIT AGENCY -->
      <div class="form-group" style="grid-column: span 2;">

        <label>{{ labels.en.exportCreditAgency }}</label>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">

          <input type="text" formControlName="exportCreditAgencyName">

          <textarea
            rows="3"
            formControlName="exportCreditAgencyDetails"
            style="resize: vertical;">
          </textarea>

        </div>

      </div>

      <!-- BUTTONS -->
      <div class="button-row">

        <button type="button" (click)="add()">
          {{ labels.en.addinexportcreditagencyfacilityparty }}
        </button>

        <button type="button" (click)="update()">
          {{ labels.en.updateinexportcreditagencyfacilityparty }}
        </button>

        <button type="button" (click)="delete()">
          {{ labels.en.deleteinexportcreditagencyfacilityparty }}
        </button>

        <button type="button" (click)="view()">
          {{ labels.en.viewinexportcreditagencyfacilityparty }}
        </button>

        <button type="button" (click)="roles()">
          {{ labels.en.rolesinexportcreditagencyfacilityparty }}
        </button>

      </div>

    </div>

  </div>

</form>
