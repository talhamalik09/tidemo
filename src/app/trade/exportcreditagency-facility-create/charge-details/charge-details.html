<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>{{ labels.en.chargeDetailsinexportcreditagencyfacilitycharge }}</h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <!-- PREFERRED CURRENCY -->
      <div class="form-group">
        <label>{{ labels.en.preferredCurrencyinexportcreditagencyfacilitycharge }}</label>

        <input
          type="text"
          formControlName="preferredCurrency"
          [placeholder]="labels.en.preferredCurrency">
      </div>

      <!-- FIRST DATE -->
      <div class="form-group">
        <label>{{ labels.en.firstDate }}</label>

        <input
          type="date"
          formControlName="firstDate">
      </div>

      <!-- DAY IN MONTH -->
      <div class="form-group">
        <label>{{ labels.en.dayInMonthinexportcreditagencyfacilitycharge }}</label>

        <input
          type="number"
          formControlName="dayInMonth"
          min="1"
          max="31"
          [placeholder]="labels.en.dayInMonth">
      </div>

      <!-- CHECKBOX -->
      <div class="checkbox-group">

        <label>
          <input
            type="checkbox"
            formControlName="deferChargesForCustomer">

          {{ labels.en.deferChargesForCustomer }}
        </label>

      </div>

    </div>

  </div>

</form>
