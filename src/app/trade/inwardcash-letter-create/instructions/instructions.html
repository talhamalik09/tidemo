<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div
      class="section-header"
      (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>
        {{ labels[lang].instructionsininwardcashletterinstructions }}
      </h3>

    </div>

    <!-- BODY -->
    <div
      class="section-body"
      *ngIf="isOpen">

      <div class="form-grid">

        <!-- INSTRUCTION RECEIVED -->
        <div class="form-group full-width">

          <label>
            {{ labels[lang].instructionReceivedininwardcashletterinstructions }}
          </label>

          <textarea
            rows="5"
            formControlName="instructionReceived">
          </textarea>

        </div>
        </div>
        <div class="form-grid">

        <!-- INSTRUCTION TO SEND -->
        <div class="form-group full-width">

          <label>
            {{ labels[lang].instructionToSend }}
          </label>

          <textarea
            rows="5"
            formControlName="instructionToSend">
          </textarea>

        </div>

      </div>

    </div>

  </div>

</form>
