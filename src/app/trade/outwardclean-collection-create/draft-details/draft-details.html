<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>{{ labels[lang].draftDetailsinoutwardcleandraft }}</h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <!-- COLLECTION AMOUNT -->
      <div class="form-group">

        <label>{{ labels[lang].collectionAmountinoutwardcleandraft }}</label>

        <input
          type="text"
          formControlName="collectionAmount">

        <textarea
          rows="3"
          formControlName="collectionAmountDetails">
        </textarea>

      </div>

      <!-- DRAFT AGAINST -->
      <div class="form-group">

        <label>{{ labels[lang].draftAgainstinoutwardcleandraft }}</label>

        <select formControlName="draftAgainst">

          <option value="" disabled selected>
            Payment
          </option>

          <option
            *ngFor="let item of draftAgainstOptions"
            [value]="item">

            {{ item }}

          </option>

        </select>

      </div>

      <!-- IDENTIFIER -->
      <div class="form-group">

        <label>{{ labels[lang].identifierinoutwardcleandraft }}</label>

        <input
          type="text"
          formControlName="identifier">

      </div>

      <!-- RATE -->
      <div class="form-group">

        <label>{{ labels[lang].rateinoutwardcleandraft }}</label>

        <input
          type="text"
          formControlName="rate">

      </div>

      <!-- START DATE -->
      <div class="form-group">

        <label>{{ labels[lang].startDateinoutwardcleandraft }}</label>

        <input
          type="date"
          formControlName="startDate">

      </div>

      <!-- END PERIOD -->
      <div class="form-group">

        <label>{{ labels[lang].endPeriodinoutwardcleandraft }}</label>

        <input
          type="text"
          formControlName="endPeriod">

      </div>

      <!-- PERCENT -->
      <div class="form-group">

        <label>{{ labels[lang].percentinoutwardcleandraft }}</label>

        <input
          type="text"
          formControlName="percent">

      </div>

      <!-- CUT OFF DATE -->
      <div class="form-group">

        <label>{{ labels[lang].cutOffDateinoutwardcleandraft }}</label>

        <input
          type="date"
          formControlName="cutOffDate">

      </div>

      <!-- DRAFT TEXT -->
      <div class="form-group">

        <label>{{ labels[lang].draftTextinoutwardcleandraft }}</label>

        <input
          type="text"
          formControlName="draftText">

      </div>

      <!-- DRAFT AMOUNT -->
      <div class="form-group">

        <label>{{ labels[lang].draftAmountinoutwardcleandraft }}</label>

        <input
          type="text"
          formControlName="draftAmount">

      </div>

      <!-- OR END DATE -->
      <div class="form-group">

        <label>{{ labels[lang].orEndDateinoutwardcleandraft }}</label>

        <input
          type="date"
          formControlName="orEndDate">

      </div>

      <!-- GRACE DAYS -->
      <div class="form-group">

        <label>{{ labels[lang].graceDaysinoutwardcleandraft }}</label>

        <input
          type="text"
          formControlName="graceDays">

      </div>

      <!-- OR AMOUNT -->
      <div class="form-group">

        <label>{{ labels[lang].orAmountinoutwardcleandraft }}</label>

        <input
          type="text"
          formControlName="orAmount">

      </div>

      <!-- OR CUT OFF PERIOD -->
      <div class="form-group">

        <label>{{ labels[lang].orCutOffPeriodinoutwardcleandraft }}</label>

        <input
          type="text"
          formControlName="orCutOffPeriod">

      </div>

      <!-- START INTEREST -->
      <div class="form-group">

        <label>{{ labels[lang].startInterestinoutwardcleandraft }}</label>

        <select formControlName="startInterest">

          <option value="">
            Select
          </option>

          <option
            *ngFor="let item of startInterestOptions"
            [value]="item">

            {{ item }}

          </option>

        </select>

      </div>

      <!-- DAY BASIS -->
      <div class="form-group">

        <label>{{ labels[lang].dayBasisinoutwardcleandraft }}</label>

        <select formControlName="dayBasis">

          <option value="">
            Select
          </option>

          <option
            *ngFor="let item of dayBasisOptions"
            [value]="item">

            {{ item }}

          </option>

        </select>

      </div>

      <!-- START FROM -->
      <div class="form-group">

        <label>{{ labels[lang].startFrominoutwardcleandraft }}</label>

        <select formControlName="startFrom">

          <option value="">
            Select
          </option>

          <option
            *ngFor="let item of startFromOptions"
            [value]="item">

            {{ item }}

          </option>

        </select>

      </div>

    </div>

  </div>

</form>
