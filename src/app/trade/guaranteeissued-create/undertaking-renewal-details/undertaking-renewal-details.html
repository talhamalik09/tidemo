<form [formGroup]="form">

<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].undertakingRenewalDetails }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <div class="form-group">
      <label>{{ labels[lang].renewalBasis }}</label>
      <select formControlName="renewalBasis">
        <option value="">Select</option>
        <option *ngFor="let option of renewalBasisOptions">
          {{ option }}
        </option>
      </select>
    </div>

  </div>

</div>

</form>
