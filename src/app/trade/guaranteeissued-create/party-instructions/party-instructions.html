<form [formGroup]="form">

<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].partyInstructions }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <!-- INSTRUCTION FROM -->
    <div class="form-group">
      <label>{{ labels[lang].instructionFromInstructingParty }}</label>
      <input type="text" formControlName="instructionFromInstructingParty">
    </div>

    <!-- RESPONSE TO -->
    <div class="form-group">
      <label>{{ labels[lang].responseToInstructingParty }}</label>
      <input type="text" formControlName="responseToInstructingParty">
    </div>

    <!-- INSTRUCTION TO NEXT PARTY -->
    <div class="form-group full-width">
      <label>{{ labels[lang].instructionToNextParty }}</label>
      <input type="text" formControlName="instructionToNextParty">
    </div>

  </div>

</div>

</form>
