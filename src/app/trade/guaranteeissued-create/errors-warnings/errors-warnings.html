<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].errorsAndWarningsinguaranteeissuederrors }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <!-- TYPE -->
    <div class="form-group">
      <label>{{ labels[lang].typeinguaranteeissuederrors }}</label>
      <div class="info-box">
        {{ labels[lang].infoinguaranteeissuederrors }}
      </div>
    </div>

    <!-- DETAILS -->
    <div class="form-group full-width">
      <label>{{ labels[lang].detailsinguaranteeissuederrors }}</label>
      <div class="info-box">
        {{ labels[lang].warningPath }}
      </div>
    </div>

  </div>

</div>
