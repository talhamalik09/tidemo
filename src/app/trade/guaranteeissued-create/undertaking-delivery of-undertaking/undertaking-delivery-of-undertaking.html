<form [formGroup]="form">

<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].undertakingDeliveryOfUndertaking }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <!-- DELIVERY OF UNDERTAKING -->
    <div class="form-group">
      <label>{{ labels[lang].deliveryOfUndertaking }}</label>

      <select formControlName="deliveryOfUndertaking">
        <option value="">Select</option>
        <option *ngFor="let o of deliveryOptions">{{ o }}</option>
      </select>
    </div>

    <!-- DELIVERY TO / COLLECTION BY -->
    <div class="form-group">
      <label>{{ labels[lang].deliveryToCollectionBy }}</label>

      <select formControlName="deliveryToCollectionBy">
        <option value="">Select</option>
        <option *ngFor="let o of collectionOptions">{{ o }}</option>
      </select>
    </div>

  </div>

</div>

</form>
