<form [formGroup]="form">

<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].instructionsReceived }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <!-- INSTRUCTING PARTY -->
    <div class="form-group">
      <label>{{ labels[lang].instructingParty }}</label>
      <select formControlName="instructingParty">
        <option value="">Select</option>
        <option *ngFor="let option of instructingPartyOptions">{{ option }}</option>
      </select>
    </div>

    <!-- RECEIVED REQUEST TYPE -->
    <div class="form-group">
      <label>{{ labels[lang].receivedRequestType }}</label>
      <input type="text" formControlName="receivedRequestType">
    </div>

    <!-- PARTY REFERENCE -->
    <div class="form-group">
      <label>{{ labels[lang].instructingPartyReference }}</label>
      <input type="text" formControlName="instructingPartyReference">
    </div>

    <!-- ISSUE BY -->
    <div class="form-group">
      <label>{{ labels[lang].issueBy }}</label>
      <select formControlName="issueBy">
        <option value="">Select</option>
        <option *ngFor="let option of issueByOptions">{{ option }}</option>
      </select>
    </div>

    <!-- APPLICANT DATE -->
    <div class="form-group">
      <label>{{ labels[lang].applicantDate }}</label>
      <input type="date" formControlName="applicantDate">
    </div>

  </div>

</div>

</form>
