<form [formGroup]="form">

<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].ourUndertakingDetails }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <div class="checkbox">
      <label>
        <input type="checkbox" formControlName="operative">
        {{ labels[lang].operativeinguarnateeissuedundertaking }}
      </label>
    </div>

  </div>

</div>

</form>
