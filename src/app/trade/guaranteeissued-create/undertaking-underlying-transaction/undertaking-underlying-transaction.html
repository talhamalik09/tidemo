<form [formGroup]="form">

<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].undertakingUnderlyingTransactionDetails }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <div class="form-group full-width">
      <label>{{ labels[lang].underlyingTransactionDetails }}</label>
      <input type="text" formControlName="underlyingTransactionDetails">
    </div>

  </div>

</div>

</form>
