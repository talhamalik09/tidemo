<form [formGroup]="form">

<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].undertakingDocumentPresentationInstructions }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <div class="form-group full-width">
      <label>{{ labels[lang].documentPresentationInstructions }}</label>
      <input type="text" formControlName="documentPresentationInstructions">
    </div>

  </div>

</div>

</form>
