<form [formGroup]="form">

<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].fxContracts }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <div class="form-group">
      <label>{{ labels[lang].referenceinguaranteeissuedfxcontract }}</label>
      <input type="text" formControlName="reference">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].branchinguaranteeissuedfxcontract }}</label>
      <input type="text" formControlName="branch">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].typeinguaranteeissuedfxcontract }}</label>
      <input type="text" formControlName="type">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].purchaseCurrencyinguaranteeissuedfxcontract }}</label>
      <input type="text" formControlName="purchaseCurrency">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].saleCurrencyinguaranteeissuedfxcontract }}</label>
      <input type="text" formControlName="saleCurrency">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].rateinguaranteeissuedfxcontract }}</label>
      <input type="text" formControlName="rate">
    </div>

    <!-- BUTTONS -->
    <div class="button-row">
      <button type="button">Add...</button>
      <button type="button">Update...</button>
      <button type="button">Delete...</button>
      <button type="button">View...</button>
    </div>

  </div>

</div>

</form>
