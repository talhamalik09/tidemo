<form [formGroup]="form">

<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].undertakingTransferableDetails }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <div class="form-group checkbox">
      <label>
        <input type="checkbox" formControlName="transferable">
        {{ labels[lang].transferableinguaranteeissuedtransferable }}
      </label>
    </div>

  </div>

</div>

</form>
