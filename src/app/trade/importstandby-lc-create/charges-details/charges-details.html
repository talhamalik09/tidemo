<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>
        {{ labels[lang].chargesDetailsinimportstandbylccharges }}
      </h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <div class="form-grid">

        <!-- PERIODIC CHARGE FIRST DATE -->
        <div class="form-group">

          <label>
            {{ labels[lang].periodicChargeFirstDateinimportstandbylccharges }}
          </label>

          <input
            type="text"
            formControlName="periodicChargeFirstDate">

        </div>

        <!-- DAY IN MONTH -->
        <div class="form-group">

          <label>
            {{ labels[lang].dayInMonthinimportstandbylccharges }}
          </label>

          <input
            type="text"
            formControlName="dayInMonth">

        </div>
</div>

         <div class="form-grid">
        <!-- PREFERRED CURRENCY -->
        <div class="form-group">

          <label>
            {{ labels[lang].preferredCurrencyinimportstandbylccharges }}
          </label>

          <input
            type="text"
            formControlName="preferredCurrency">

        </div>

        <!-- CHARGE ACCOUNT -->
        <div class="form-group">

          <label>
            {{ labels[lang].chargeAccountinimportstandbylccharges }}
          </label>

          <input
            type="text"
            formControlName="chargeAccount">

        </div>
</div>

        <div class="form-grid">
        <!-- OUR CHARGES -->
        <div class="form-group">

          <label>
            {{ labels[lang].ourChargesinimportstandbylccharges }}
          </label>

          <select formControlName="ourCharges">

            <option value="">
              {{ labels[lang].selectinimportstandbylccharges }}
            </option>

            <option
              *ngFor="let item of ourChargesOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>

        <!-- OVERSEAS -->
        <div class="form-group">

          <label>
            {{ labels[lang].overseasinimportstandbylccharges }}
          </label>

          <select formControlName="overseas">

            <option value="">
              {{ labels[lang].selectinimportstandbylccharges }}
            </option>

            <option
              *ngFor="let item of overseasOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>
</div>

        <div class="form-grid">
        <!-- TAX PAID BY -->
        <div class="form-group">

          <label>
            {{ labels[lang].taxPaidByinimportstandbylccharges }}
          </label>

          <select formControlName="taxPaidBy">

            <option value="">
              {{ labels[lang].selectinimportstandbylccharges }}
            </option>

            <option
              *ngFor="let item of taxPaidByOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>

        <!-- BILLING LEVEL -->
        <div class="form-group">

          <label>
            {{ labels[lang].billingLevelinimportstandbylccharges }}
          </label>

          <select formControlName="billingLevel">

            <option value="">
              {{ labels[lang].selectinimportstandbylccharges }}
            </option>

            <option
              *ngFor="let item of billingLevelOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>

        </div>

        <div class="form-grid">
        <!-- CUSTOMER ADDRESS DEBIT -->
        <div class="form-group">

          <label>
            {{ labels[lang].customerAddressDebitinimportstandbylccharges }}
          </label>

          <select formControlName="customerAddressDebit">

            <option
              *ngFor="let item of customerAddressOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>

        <!-- VIEW BUTTON -->
        <div class="button-row">

          <label>&nbsp;</label>

          <button
            type="button"
            (click)="view()">

            {{ labels[lang].viewinimportstandbylccharges }}

          </button>

        </div>
        </div>

        <div class="form-grid">

        <!-- CHECKBOXES -->
        <div class="checkbox-group">

          <label>

            <input
              type="checkbox"
              formControlName="defer">

            {{ labels[lang].deferinimportstandbylccharges }}

          </label>

          <label>

            <input
              type="checkbox"
              formControlName="billingInvoicesAutomated">

            {{ labels[lang].billingInvoicesAutomatedinimportstandbylccharges }}

          </label>

          <label>

            <input
              type="checkbox"
              formControlName="reimburseCharges">

            {{ labels[lang].reimburseChargesinimportstandbylccharges }}

          </label>

        </div>

        <!-- USER CHARGES TEXT -->
        <div class="form-group full-width">

          <label>
            {{ labels[lang].userChargesTextinimportstandbylccharges }}
          </label>

          <textarea
            rows="5"
            formControlName="userChargesText">
          </textarea>

        </div>

      </div>

    </div>

  </div>

</form>
