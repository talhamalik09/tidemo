<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>
        {{ labels[lang].deliveryOfUndertakingTitleinguaranteereceiveddelivery }}
      </h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <div class="form-grid">

        <!-- DELIVERY OF UNDERTAKING -->
        <div class="form-group">

          <label>
            {{ labels[lang].deliveryOfUndertakinginguaranteereceiveddelivery }}
          </label>

          <select formControlName="deliveryOfUndertaking">

            <option value="">
              {{ labels[lang].selectinguaranteereceiveddelivery }}
            </option>

            <option
              *ngFor="let item of deliveryOfUndertakingOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>

        <!-- DELIVERY TO / COLLECTION BY -->
        <div class="form-group">

          <label>
            {{ labels[lang].deliveryToCollectionByinguaranteereceiveddelivery }}
          </label>

          <select formControlName="deliveryToCollectionBy">

            <option value="">
              {{ labels[lang].selectinguaranteereceiveddelivery }}
            </option>

            <option
              *ngFor="let item of deliveryToOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>

      </div>

    </div>

  </div>

</form>
