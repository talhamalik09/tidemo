<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>
        {{ labels[lang].undertakingMainDetailsinguaranteereceivedundertaking }}
      </h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

     

        <!-- SINGLE INPUT FIELDS -->

        <div class="form-group">
          <label>{{ labels[lang].issueDateinguaranteereceivedundertaking }}</label>
          <input type="date" formControlName="issueDate">
        </div>

        <div class="form-group">
          <label>{{ labels[lang].expiryDateinguaranteereceivedundertaking }}</label>
          <input type="date" formControlName="expiryDate">
        </div>

        <div class="form-group">
          <label>{{ labels[lang].notPayableBeforeinguaranteereceivedundertaking }}</label>
          <input type="text" formControlName="notPayableBefore">
        </div>

        <div class="form-group">
          <label>{{ labels[lang].governingLawCountryinguaranteereceivedundertaking }}</label>
          <input type="text" formControlName="governingLawCountry">
        </div>

        <div class="form-group">
          <label>{{ labels[lang].governingLawCountrySubdivisioninguaranteereceivedundertaking }}</label>
          <input type="text" formControlName="governingLawCountrySubdivision">
        </div>

        <div class="form-group">
          <label>{{ labels[lang].placeOfJurisdictioninguaranteereceivedundertaking }}</label>
          <input type="text" formControlName="placeOfJurisdiction">
        </div>

        <!-- DROPDOWNS -->

        <div class="form-group">
          <label>{{ labels[lang].formOfUndertakinginguaranteereceivedundertaking }}</label>

          <select formControlName="formOfUndertaking">
            <option value="">{{ labels[lang].selectinguaranteereceivedundertaking }}</option>

            <option *ngFor="let item of formOfUndertakingOptions" [value]="item">
              {{ item }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>{{ labels[lang].applicableRulesinguaranteereceivedundertaking }}</label>

          <select formControlName="applicableRules">
            <option value="">{{ labels[lang].selectinguaranteereceivedundertaking }}</option>

            <option *ngFor="let item of applicableRulesOptions" [value]="item">
              {{ item }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>{{ labels[lang].expiryTypeinguaranteereceivedundertaking }}</label>

          <select formControlName="expiryType">
            <option value="">{{ labels[lang].selectinguaranteereceivedundertaking }}</option>

            <option *ngFor="let item of expiryTypeOptions" [value]="item">
              {{ item }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>{{ labels[lang].financialTradeinguaranteereceivedundertaking }}</label>

          <select formControlName="financialTrade">
            <option value="">{{ labels[lang].selectinguaranteereceivedundertaking }}</option>

            <option *ngFor="let item of financialTradeOptions" [value]="item">
              {{ item }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>{{ labels[lang].productTypeinguaranteereceivedundertaking }}</label>

          <select formControlName="productType">
            <option value="">{{ labels[lang].selectinguaranteereceivedundertaking }}</option>

            <option *ngFor="let item of productTypeOptions" [value]="item">
              {{ item }}
            </option>
          </select>
        </div>

        <!-- CHECKBOXES -->

        <div class="checkbox-group full-width">

          <label>
            <input type="checkbox" formControlName="automaticRelease">
            {{ labels[lang].automaticReleaseinguaranteereceivedundertaking }}
          </label>

          <label>
            <input type="checkbox" formControlName="domesticExpiry">
            {{ labels[lang].domesticExpiryinguaranteereceivedundertaking }}
          </label>

          <label>
            <input type="checkbox" formControlName="partialDrawing">
            {{ labels[lang].partialDrawinginguaranteereceivedundertaking }}
          </label>

          <label>
            <input type="checkbox" formControlName="multiplesDrawing">
            {{ labels[lang].multiplesDrawinginguaranteereceivedundertaking }}
          </label>

        </div>

      

    </div>

  </div>

</form>
