<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>
        {{ labels[lang].fxContractsinguaranteereceivedfx}}
      </h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <div class="form-grid">

        <!-- REFERENCE -->
        <div class="form-group">

          <label>{{ labels[lang].referenceinguaranteereceivedfx}}</label>

          <input type="text" formControlName="reference">

        </div>

        <!-- BRANCH -->
        <div class="form-group">

          <label>{{ labels[lang].branchinguaranteereceivedfx}}</label>

          <input type="text" formControlName="branch">

        </div>

</div>
        <div class="form-grid">
        <!-- TYPE -->
        <div class="form-group">

          <label>{{ labels[lang].typeinguaranteereceivedfx}}</label>

          <input type="text" formControlName="type">

        </div>

        <!-- PURCHASE CURRENCY -->
        <div class="form-group">

          <label>{{ labels[lang].purchaseCurrencyinguaranteereceivedfx}}</label>

          <input type="text" formControlName="purchaseCurrency">

        </div>

        </div>
         <div class="form-grid">

        <!-- SALE CURRENCY -->
        <div class="form-group">

          <label>{{ labels[lang].saleCurrencyinguaranteereceivedfx}}</label>

          <input type="text" formControlName="saleCurrency">

        </div>

        <!-- RATE -->
        <div class="form-group">

          <label>{{ labels[lang].rateinguaranteereceivedfx}}</label>

          <input type="text" formControlName="rate">

        </div>


        </div>
        <div class="form-grid">
        <!-- BUTTONS -->
        <div class="button-row">

          <button type="button">
            {{ labels[lang].addinguaranteereceivedfx}}
          </button>

          <button type="button">
            {{ labels[lang].updateinguaranteereceivedfx}}
          </button>

          <button type="button">
            {{ labels[lang].deleteinguaranteereceivedfx}}
          </button>

          <button type="button">
            {{ labels[lang].viewinguaranteereceivedfx}}
          </button>

        </div>

      </div>

    </div>

  </div>

</form>
