<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>{{ labels[lang].marginDepositinguaranteereceivedmargin  }}</h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <div class="form-grid">

        <!-- PERCENT -->
        <div class="form-group">

          <label>{{ labels[lang].percentinguaranteereceivedmargin  }}</label>

          <input
            type="text"
            formControlName="percent">

        </div>

        <!-- COLLATERAL TYPE -->
        <div class="form-group">

          <label>
            {{ labels[lang].marginDepositCollateralTypeinguaranteereceivedmargin  }}
          </label>

          <input
            type="text"
            formControlName="marginDepositCollateralType">

        </div>

</div>
        <div class="form-grid">
        <!-- ACCOUNT -->
        <div class="form-group">

          <label>{{ labels[lang].accountinguaranteereceivedmargin  }}</label>

          <input
            type="text"
            formControlName="account">

        </div>

        <!-- CURRENCY -->
        <div class="form-group">

          <label>{{ labels[lang].inCurrencyinguaranteereceivedmargin  }}</label>

          <input
            type="text"
            formControlName="inCurrency">

        </div>
</div>
        <div class="form-grid">

        <!-- DESCRIPTION -->
        <div class="form-group">

          <label>{{ labels[lang].descriptioninguaranteereceivedmargin  }}</label>

          <input
            type="text"
            formControlName="description">

        </div>

        <!-- MARGIN DEFINED AS -->
        <div class="form-group">

          <label>{{ labels[lang].marginDefinedAsinguaranteereceivedmargin  }}</label>

          <select formControlName="marginDefinedAs">

            <option value="">
              Select
            </option>

            <option
              *ngFor="let item of marginDefinedAsOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>
</div>
        <div class="form-grid">
        <!-- OF AMOUNT -->
        <div class="form-group full-width">

          <label>{{ labels[lang].ofAmountinguaranteereceivedmargin  }}</label>

          <select formControlName="ofAmount">

            <option value="">
              Select
            </option>

            <option
              *ngFor="let item of ofAmountOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>

        <!-- BUTTON -->
        <div class="button-row">

          <button
            type="button"
            (click)="refresh()">

            {{ labels[lang].refreshinguaranteereceivedmargin  }}

          </button>

        </div>

      </div>

    </div>

  </div>

</form>
