<form [formGroup]="form">

<div class="section">

  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].otherDetailsinoutwarddocumentaryother }}</h3>
  </div>

  <div class="section-body" *ngIf="isOpen">

    <div class="form-group">
      <label>{{ labels[lang].inputBranchinoutwarddocumentaryother }}</label>
      <input type="text" formControlName="inputBranch" placeholder="CITY">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].behalfOfBranchinoutwarddocumentaryother }}</label>
      <input type="text" formControlName="behalfOfBranch" placeholder="LOND">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].responsibleTeaminoutwarddocumentaryother }}</label>
      <input type="text" formControlName="responsibleTeam" placeholder="HUB">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].relatedReferenceinoutwarddocumentaryother }}</label>
      <input type="text" formControlName="relatedReference">
    </div>

  </div>

</div>

</form>
