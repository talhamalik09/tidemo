<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">
      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>{{ labels.en.discountDetails }}</h3>
    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <!-- DISCOUNT ACCEPTANCE -->
      <div class="checkbox-group">

        <label>
          <input
            type="checkbox"
            formControlName="discountAcceptance"
          >

          {{ labels.en.discountAcceptance }}
        </label>

      </div>

    </div>

  </div>

</form>
