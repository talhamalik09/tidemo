<form [formGroup]="form">

<div class="section">

  <!-- HEADER -->
  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].partyListincleanbankersacceptanceparty }}</h3>
  </div>

  <!-- BODY -->
  <div class="section-body" [class.closed]="!isOpen">

    <div class="form-grid">
      <div class="checkbox-group">

      <!-- CHECKBOXES -->
      <div class="form-group checkbox">
        <label><input type="checkbox" formControlName="sharedLiability"> {{ labels[lang].sharedLiabilityincleanbankersacceptanceparty }}</label>
      </div>

      <div class="form-group checkbox">
        <label><input type="checkbox" formControlName="showExtraParties"> {{ labels[lang].showExtraPartiesincleanbankersacceptanceparty }}</label>
      </div>

      <div class="form-group checkbox">
        <label><input type="checkbox" formControlName="showLiabilitySharedParties"> {{ labels[lang].showLiabilitySharedPartiesincleanbankersacceptanceparty }}</label>
      </div>

      <div class="form-group checkbox">
        <label><input type="checkbox" formControlName="linkToParticipation"> {{ labels[lang].linkToParticipationincleanbankersacceptanceparty }}</label>
      </div>

      <div class="form-group checkbox">
        <label><input type="checkbox" formControlName="showAllParties"> {{ labels[lang].showAllPartiesincleanbankersacceptanceparty }}</label>
      </div>
      </div>

      <!-- INPUTS -->
      <div class="form-group">
        <label>{{ labels[lang].roleincleanbankersacceptanceparty }}</label>
        <input type="text" formControlName="role">
      </div>

      <div class="form-group">
        <label>{{ labels[lang].partyincleanbankersacceptanceparty }}</label>
        <input type="text" formControlName="party">
      </div>

      <div class="form-group">
        <label>{{ labels[lang].referenceincleanbankersacceptanceparty }}</label>
        <input type="text" formControlName="reference">
      </div>

      <div class="form-group">
        <label>{{ labels[lang].liabilityincleanbankersacceptanceparty }}</label>
        <input type="text" formControlName="liability">
      </div>

      <!-- BUTTONS -->
      <div class="button-row">
        <button type="button" (click)="add()">{{ labels[lang].addincleanbankersacceptanceparty }}</button>
        <button type="button" (click)="update()">{{ labels[lang].updateincleanbankersacceptanceparty }}</button>
        <button type="button" (click)="delete()">{{ labels[lang].deleteincleanbankersacceptanceparty }}</button>
        <button type="button" (click)="view()">{{ labels[lang].viewincleanbankersacceptanceparty }}</button>
        <button type="button" (click)="roles()">{{ labels[lang].rolesincleanbankersacceptanceparty }}</button>
      </div>

    </div>

  </div>

</div>

</form>
