<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">
      <span>{{ isOpen ? '▲' : '▼' }}</span>
      <h3>{{ labels[lang].reimbursingDetails }}</h3>
    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <!-- REIMBURSING BANK (2 INPUTS) -->
      <div class="form-group">
        <label>{{ labels[lang].reimbursingBankinfreelynegotiablereimbursing }}</label>

        <input type="text"
               formControlName="reimbursingBankName"
               placeholder="{{ labels[lang].bankName }}">

        <textarea rows="4"
                  formControlName="reimbursingBankAddress"
                  placeholder="{{ labels[lang].bankAddress }}">
        </textarea>
      </div>

      <!-- REFERENCE -->
      <div class="form-group">
        <label>{{ labels[lang].referenceinfreelynegotiablereimbursing }}</label>
        <input type="text" formControlName="reference">
      </div>

      <!-- NOTES -->
      <div class="form-group">
        <label>{{ labels[lang].notesToReimbursingParty }}</label>

        <textarea rows="5"
                  formControlName="notesToReimbursingParty">
        </textarea>
      </div>

    </div>

  </div>

</form>
