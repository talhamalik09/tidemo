<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">
      <span>{{ isOpen ? '▲' : '▼' }}</span>
      <h3>{{ labels[lang].associatedPaymentDetails }}</h3>
    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <!-- TYPE -->
      <div class="form-group">
        <label>{{ labels[lang].typeinfreelynegotiableassociated }}</label>
        <input type="text" formControlName="type">
      </div>

      <!-- AMOUNT -->
      <div class="form-group">
        <label>{{ labels[lang].amountinfreelynegotiableassociated }}</label>
        <input type="number" formControlName="amount">
      </div>

      <!-- DETAILS -->
      <div class="form-group">
        <label>{{ labels[lang].detailsinfreelynegotiableassociated }}</label>
        <input type="text" formControlName="details">
      </div>

      <!-- BUTTONS -->
      <div class="button-row">

        <button type="button" (click)="split()">
          {{ labels[lang].split }}
        </button>

        <button type="button" (click)="finance()">
          {{ labels[lang].finance }}
        </button>

        <button type="button" (click)="update()">
          {{ labels[lang].updateinfreelynegotiableassociated }}
        </button>

        <button type="button" (click)="delete()">
          {{ labels[lang].deleteinfreelynegotiableassociated }}
        </button>

      </div>

    </div>

  </div>

</form>
