<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">
      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>{{ labels[lang].foreignExchangeContractsinoutwardcashletterforeignexchange }}</h3>
    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <!-- REFERENCE -->
      <div class="form-group">
        <label>{{ labels[lang].referenceinoutwardcashletterforeignexchange }}</label>
        <input type="text" formControlName="reference">
      </div>

      <!-- BRANCH -->
      <div class="form-group">
        <label>{{ labels[lang].branchinoutwardcashletterforeignexchange }}</label>
        <input type="text" formControlName="branch">
      </div>

      <!-- TYPE -->
      <div class="form-group">
        <label>{{ labels[lang].typeinoutwardcashletterforeignexchange }}</label>
        <input type="text" formControlName="type">
      </div>

      <!-- PURCHASE CURRENCY -->
      <div class="form-group">
        <label>{{ labels[lang].purchaseCurrencyinoutwardcashletterforeignexchange }}</label>
        <input type="text" formControlName="purchaseCurrency">
      </div>

      <!-- SALE CURRENCY -->
      <div class="form-group">
        <label>{{ labels[lang].saleCurrencyinoutwardcashletterforeignexchange }}</label>
        <input type="text" formControlName="saleCurrency">
      </div>

      <!-- RATE -->
      <div class="form-group">
        <label>{{ labels[lang].rateinoutwardcashletterforeignexchange }}</label>
        <input type="text" formControlName="rate">
      </div>

      <!-- BUTTONS -->
      <div class="button-row">

        <button type="button">{{ labels[lang].addinoutwardcashletterforeignexchange }}</button>
        <button type="button">{{ labels[lang].updateinoutwardcashletterforeignexchange }}</button>
        <button type="button">{{ labels[lang].deleteinoutwardcashletterforeignexchange }}</button>
        <button type="button">{{ labels[lang].viewinoutwardcashletterforeignexchange }}</button>

      </div>

    </div>

  </div>

</form>
