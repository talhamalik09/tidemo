<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>
        {{ labels[lang].fxContractsininwardcleanparties }}
      </h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <!-- REFERENCE -->
      <div class="form-group">

        <label>
          {{ labels[lang].referenceininwardcleanparties }}
        </label>

        <input type="text" formControlName="reference">

      </div>

      <!-- BRANCH -->
      <div class="form-group">

        <label>
          {{ labels[lang].branchininwardcleanparties }}
        </label>

        <input type="text" formControlName="branch">

      </div>

      <!-- TYPE -->
      <div class="form-group">

        <label>
          {{ labels[lang].typeininwardcleanparties }}
        </label>

        <input type="text" formControlName="type">

      </div>

      <!-- PURCHASE CURRENCY -->
      <div class="form-group">

        <label>
          {{ labels[lang].purchaseCurrencyininwardcleanparties }}
        </label>

        <input type="text" formControlName="purchaseCurrency">

      </div>

      <!-- SALE CURRENCY -->
      <div class="form-group">

        <label>
          {{ labels[lang].saleCurrencyininwardcleanparties }}
        </label>

        <input type="text" formControlName="saleCurrency">

      </div>

      <!-- RATE -->
      <div class="form-group">

        <label>
          {{ labels[lang].rateininwardcleanparties }}
        </label>

        <input type="text" formControlName="rate">

      </div>

      <!-- BUTTONS -->
      <div class="button-row">

        <button type="button">
          {{ labels[lang].addininwardcleanparties }}
        </button>

        <button type="button">
          {{ labels[lang].updateininwardcleanparties }}
        </button>

        <button type="button">
          {{ labels[lang].deleteininwardcleanparties }}
        </button>

        <button type="button">
          {{ labels[lang].viewininwardcleanparties }}
        </button>

      </div>

    </div>

  </div>

</form>
