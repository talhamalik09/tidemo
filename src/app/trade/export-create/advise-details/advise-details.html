<form [formGroup]="form">

<div class="section">

  <!-- HEADER -->
  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].adviseDetails }}</h3>
  </div>

  <!-- BODY -->
  <div class="section-body" *ngIf="isOpen">

    <div class="form-group">
      <label>{{ labels[lang].instructionNextBank }}</label>
      <input type="text" formControlName="instructionNextBank">
    </div>

    <div class="form-group1">
      <label>{{ labels[lang].instructionPayingBank }}</label>
      <input type="text" formControlName="instructionPayingBank">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].instructionIntermediaryBank }}</label>
      <input type="text" formControlName="instructionIntermediaryBank">
    </div>

    <div class="form-group">
      <label>{{ labels[lang].account }}</label>
      <input type="text" formControlName="account">
    </div>

    <!-- NEXT ADVISING BANK -->
    <div class="form-group full-width">
      <label>{{ labels[lang].nextAdvisingBank }}</label>

      <input type="text" formControlName="nextAdvisingBankShort">
      <textarea formControlName="nextAdvisingBankLong"></textarea>
    </div>

    <!-- ADVISE THROUGH BANK -->
    <div class="form-group full-width">
      <label>{{ labels[lang].adviseThroughBank }}</label>

      <input type="text" formControlName="adviseThroughBankShort">
      <textarea formControlName="adviseThroughBankLong"></textarea>
    </div>

    <!-- DROPDOWN -->
    <div class="form-group">
      <label>{{ labels[lang].confirmationInstruction }}</label>
      <select formControlName="confirmationInstruction">
        <option value="">Select</option>
        <option value="confirmed">Confirmed</option>
        <option value="may_add">May Add</option>
        <option value="unconfirmed">Unconfirmed</option>
      </select>
    </div>

  </div>

</div>

</form>
