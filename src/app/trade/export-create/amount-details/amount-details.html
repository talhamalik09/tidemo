<form [formGroup]="form">

<div class="section">

  <!-- HEADER -->
  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].amountDetailsinex }}</h3>
  </div>

  <!-- BODY -->
  <div class="section-body" [class.closed]="!isOpen">

    <!-- AMOUNT (2 INPUTS) -->
    <div class="form-group full-width">
      <label>{{ labels[lang].amountinexportadvisedetails }}</label>

      <input type="text" formControlName="amountShort">
      <textarea formControlName="amountLong"></textarea>
    </div>

    <!-- ADDITIONAL AMOUNTS -->
    <div class="form-group">
      <label>{{ labels[lang].additionalAmounts }}</label>
      <input type="text" formControlName="additionalAmounts">
    </div>

    <!-- ADDITIONAL INFO -->
    <div class="form-group">
      <label>{{ labels[lang].additionalAmountInformation }}</label>
      <input type="text" formControlName="additionalAmountInformation">
    </div>

    <!-- TOLERANCE -->
    <div class="form-group">
      <label>{{ labels[lang].tolerance }}</label>

      <select formControlName="tolerance">
        <option value="">Select</option>
        <option *ngFor="let t of toleranceOptions">{{ t }}</option>
      </select>
    </div>

  </div>

</div>

</form>
