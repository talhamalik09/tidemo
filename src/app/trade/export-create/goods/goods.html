<form [formGroup]="form">

<div class="section">

  <!-- HEADER -->
  <div class="section-header" (click)="toggleSection()">
    <span>{{ isOpen ? '▲' : '▼' }}</span>
    <h3>{{ labels[lang].goodsinexportgoods }}</h3>
  </div>

  <!-- BODY -->
  <div class="section-body" [class.closed]="!isOpen">

    <!-- GOODS CODE -->
    <div class="form-group">
      <label>{{ labels[lang].goodsCodeinexportgoods  }}</label>
      <input type="text" formControlName="goodsCode">
    </div>

    <!-- GOODS DESCRIPTION -->
    <div class="form-group full-width">
      <label>{{ labels[lang].goodsDescriptioninexportgoods  }}</label>
      <input type="text" formControlName="goodsDescription">
    </div>

  </div>

</div>

</form>
