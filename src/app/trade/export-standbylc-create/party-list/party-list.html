<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>
        {{ labels[lang].partyListinimportstandbylcparty }}
      </h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      

        <!-- CHECKBOXES -->
        <div class="checkbox-group">

          <label>
            <input type="checkbox" formControlName="sharedLiability">
            {{ labels[lang].sharedLiabilityinimportstandbylcparty }}
          </label>

          <label>
            <input type="checkbox" formControlName="showExtraParties">
            {{ labels[lang].showExtraPartiesinimportstandbylcparty }}
          </label>

          <label>
            <input type="checkbox" formControlName="showLiabilitySharedParties">
            {{ labels[lang].showLiabilitySharedPartiesinimportstandbylcparty }}
          </label>

          <label>
            <input type="checkbox" formControlName="linkToParticipationFacility">
            {{ labels[lang].linkToParticipationFacilityinimportstandbylcparty }}
          </label>

          <label>
            <input type="checkbox" formControlName="showAllParties">
            {{ labels[lang].showAllPartiesinimportstandbylcparty }}
          </label>

        </div>

        <!-- ROLE -->
        <div class="form-group">

          <label>{{ labels[lang].roleinimportstandbylcparty }}</label>

          <input type="text" formControlName="role">

        </div>

        <!-- PARTY -->
        <div class="form-group">

          <label>{{ labels[lang].partyinimportstandbylcparty }}</label>

          <input type="text" formControlName="party">

        </div>

        <!-- REFERENCE -->
        <div class="form-group">

          <label>{{ labels[lang].referenceinimportstandbylcparty }}</label>

          <input type="text" formControlName="reference">

        </div>

        <!-- LIABILITY -->
        <div class="form-group">

          <label>{{ labels[lang].liabilityinimportstandbylcparty }}</label>

          <input type="text" formControlName="liability">

        </div>

        <!-- BUTTONS -->
        <div class="button-row">

          <button type="button">
            {{ labels[lang].addinimportstandbylcparty }}
          </button>

          <button type="button">
            {{ labels[lang].updateinimportstandbylcparty }}
          </button>

          <button type="button">
            {{ labels[lang].deleteinimportstandbylcparty }}
          </button>

          <button type="button">
            {{ labels[lang].viewinimportstandbylcparty }}
          </button>

          <button type="button">
            {{ labels[lang].rolesinimportstandbylcparty }}
          </button>

        </div>

     

    </div>

  </div>

</form>
