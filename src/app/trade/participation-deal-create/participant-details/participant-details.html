<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">
      <span>{{ isOpen ? '▲' : '▼' }}</span>
      <h3>{{ labels[lang].participantDetails }}</h3>
    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      <!-- CHECKBOXES -->
      <div class="checkbox-group">

        <label>
          <input type="checkbox" formControlName="sharedLiability">
          {{ labels[lang].sharedLiabilityinparticipationdealparticipantdeals }}
        </label>

        <label>
          <input type="checkbox" formControlName="showExtraParties">
          {{ labels[lang].showExtraPartiesinparticipationdealparticipantdeals }}
        </label>

        <label>
          <input type="checkbox" formControlName="showLiabilitySharedParties">
          {{ labels[lang].showLiabilitySharedPartiesinparticipationdealparticipantdeals }}
        </label>

        <label>
          <input type="checkbox" formControlName="showAllParties">
          {{ labels[lang].showAllPartiesinparticipationdealparticipantdeals }}
        </label>

      </div>

      <!-- ROLE -->
      <div class="form-group">
        <label>{{ labels[lang].roleinparticipationdealparticipantdeals }}</label>
        <input type="text" formControlName="role">
      </div>

      <!-- NAME -->
      <div class="form-group">
        <label>{{ labels[lang].name }}</label>
        <input type="text" formControlName="name">
      </div>

      <!-- REFERENCE -->
      <div class="form-group">
        <label>{{ labels[lang].referenceinparticipationdealparticipantdeals }}</label>
        <input type="text" formControlName="reference">
      </div>

      <!-- SHARE -->
      <div class="form-group">
        <label>{{ labels[lang].share }}</label>
        <input type="text" formControlName="share">
      </div>

      <!-- ROUNDING -->
      <div class="form-group">
        <label>{{ labels[lang].rounding }}</label>
        <input type="text" formControlName="rounding">
      </div>

      <!-- BUTTONS -->
      <div class="button-row">

        <button type="button" (click)="roles()">
          {{ labels[lang].rolesinparticipationdealparticipantdeals }}
        </button>

        <button type="button" (click)="add()">
          {{ labels[lang].addinparticipationdealparticipantdeals }}
        </button>

        <button type="button" (click)="view()">
          {{ labels[lang].viewinparticipationdealparticipantdeals }}
        </button>

        <button type="button" (click)="update()">
          {{ labels[lang].updateinparticipationdealparticipantdeals }}
        </button>

        <button type="button" (click)="delete()">
          {{ labels[lang].deleteinparticipationdealparticipantdeals }}
        </button>

      </div>

    </div>

  </div>

</form>
