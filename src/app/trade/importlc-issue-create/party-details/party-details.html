<form [formGroup]="form">

  <div class="section">

    <!-- HEADER -->
    <div class="section-header" (click)="toggleSection()">

      <span>{{ isOpen ? '▲' : '▼' }}</span>

      <h3>
        {{ labels[lang].partyDetailsinimportlcissuepartydetails }}
      </h3>

    </div>

    <!-- BODY -->
    <div class="section-body" *ngIf="isOpen">

      

        <!-- APPLICANT -->
        <div class="form-group">

          <label>{{ labels[lang].applicantinimportlcissuepartydetails }}</label>

          <textarea rows="3" formControlName="applicant"></textarea>

        </div>

        <!-- BENEFICIARY -->
        <div class="form-group">

          <label>{{ labels[lang].beneficiaryinimportlcissuepartydetails }}</label>

          <textarea rows="3" formControlName="beneficiary"></textarea>

        </div>

        <!-- ADVISING BANK -->
        <div class="form-group">

          <label>{{ labels[lang].advisingBankinimportlcissuepartydetails }}</label>

          <textarea rows="3" formControlName="advisingBank"></textarea>

        </div>

        <!-- ACCOUNT -->
        <div class="form-group">

          <label>{{ labels[lang].accountinimportlcissuepartydetails }}</label>

          <textarea rows="3" formControlName="account"></textarea>

        </div>

        <!-- COUNTRY -->
        <div class="form-group">

          <label>{{ labels[lang].countryinimportlcissuepartydetails }}</label>

          <input type="text" formControlName="country">

        </div>

        <!-- PERCENT -->
        <div class="form-group">

          <label>{{ labels[lang].percentinimportlcissuepartydetails}}</label>

          <input type="text" formControlName="percent">

        </div>

        <!-- AVAILABLE BY -->
        <div class="form-group">

          <label>{{ labels[lang].availableByinimportlcissuepartydetails }}</label>

          <select formControlName="availableBy">

            <option value="">
              {{ labels[lang].selectinimportlcissuepartydetails }}
            </option>

            <option
              *ngFor="let item of availableByOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>

        <!-- TOLERANCE -->
        <div class="form-group">

          <label>{{ labels[lang].toleranceinimportlcissuepartydetails }}</label>

          <select formControlName="tolerance">

            <option value="">
              {{ labels[lang].selectinimportlcissuepartydetails }}
            </option>

            <option
              *ngFor="let item of toleranceOptions"
              [value]="item">

              {{ item }}

            </option>

          </select>

        </div>

        <!-- REFRESH BUTTON -->
        <div class="button-row">

          <button type="button" (click)="refresh()">
            Refresh
          </button>

        </div>

      </div>

    

  </div>

</form>
